<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js" referrerpolicy="origin"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=42">
</head>

<body>


    <div class="app-container">
        <aside class="sidebar glass-panel">
            <div id="search-panel">
                <div class="search-quick">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search tasks or journals...">
                    <button id="search-advanced-toggle" title="Advanced search">
                        <i class="ph ph-sliders-horizontal"></i>
                    </button>
                </div>
                <div id="search-advanced" class="search-advanced hidden">
                    <div class="search-field">
                        <label>Status</label>
                        <div class="search-state-chips">
                            <label><input type="checkbox" value="TODO"> TODO</label>
                            <label><input type="checkbox" value="WIP"> WIP</label>
                            <label><input type="checkbox" value="MEMO"> MEMO</label>
                            <label><input type="checkbox" value="DONE"> DONE</label>
                        </div>
                    </div>
                    <div class="search-field">
                        <label>Date Range</label>
                        <div class="search-dates">
                            <input type="date" id="search-from">
                            <span>&mdash;</span>
                            <input type="date" id="search-to">
                        </div>
                    </div>
                    <div class="search-actions">
                        <button id="search-clear" class="btn-secondary btn-small">Clear</button>
                        <button id="search-apply" class="btn-primary btn-small">Apply Filters</button>
                    </div>
                </div>
            </div>

            <div class="sidebar-section open">
                <div class="sidebar-section-header">
                    <h2><i class="ph ph-caret-right sidebar-section-caret"></i><i class="ph ph-push-pin"></i> Markers</h2>
                </div>
                <div class="sidebar-section-content">
                    <div id="reminders-container">
                        <div class="loading-state">No active markers.</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section open">
                <div class="sidebar-section-header">
                    <h2><i class="ph ph-caret-right sidebar-section-caret"></i><i class="ph ph-note"></i> Memos
                        <button id="memo-add-folder-btn" title="New folder" class="memo-add-folder-btn"><i class="ph ph-folder-plus"></i></button>
                    </h2>
                </div>
                <div class="sidebar-section-content">
                    <div id="memo-new-folder-row" class="memo-new-folder-row hidden">
                        <input type="text" id="memo-new-folder-input" placeholder="Folder name..." class="memo-folder-input" />
                        <button id="memo-new-folder-save" class="btn-primary btn-small">Save</button>
                        <button id="memo-new-folder-cancel" class="btn-secondary btn-small">✕</button>
                    </div>
                    <div id="memos-container">
                        <div class="loading-state">No memos yet.</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section open">
                <div class="sidebar-section-header">
                    <h2><i class="ph ph-caret-right sidebar-section-caret"></i><i class="ph ph-clock"></i> Timeline</h2>
                </div>
                <div class="sidebar-section-content">
                    <div id="timeline-container">
                        <div class="loading-state"><i class="ph ph-spinner ph-spin"></i> Loading...</div>
                    </div>
                </div>
            </div>
        </aside>
        <div class="sidebar-resizer" id="sidebar-resizer"></div>

        <main class="main-column">
            <section class="add-item-section glass-panel" style="margin-bottom: 1rem;">
                <form id="add-item-form">
                    <input type="text" id="heading-input" placeholder="What are you working on?" required
                        autocomplete="off">
                    <button type="submit" class="btn-primary"><i class="ph ph-plus"></i> Add</button>
                </form>
            </section>

            <section class="items-list" id="items-container">
                <div class="loading-state">
                    <i class="ph ph-spinner ph-spin"></i> Loading journal entries...
                </div>
            </section>

            <h3 class="archived-header" id="archived-header"><i class="ph ph-archive"></i> Archived View</h3>
            <div id="archived-container" class="items-list"></div>
        </main>
    </div>

    <!-- Global Marker Popover -->
    <div id="marker-popover" class="marker-popover hidden">
        <div class="marker-popover-header">
            <span>Marker Options</span>
            <button class="btn-close" id="marker-popover-close"><i class="ph ph-x"></i></button>
        </div>
        <div class="marker-popover-body">
            <button id="marker-btn-close" class="btn-danger btn-small" style="width: 100%; margin-bottom: 0.5rem;"><i class="ph ph-trash"></i> Close Marker</button>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 0.5rem 0;">
            <div class="reminder-section">
                <label style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.2rem; display: block;">Set Reminder</label>
                <input type="datetime-local" id="marker-reminder-input" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.25rem; border-radius: 4px; margin-bottom: 0.5rem; font-size: 0.75rem;" />
                <button id="marker-btn-reminder" class="btn-primary btn-small" style="width: 100%;"><i class="ph ph-bell"></i> Save Reminder</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}?v=15"></script>
</body>

</html>
